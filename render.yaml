services:
  - type: web
    name: todo-api
    runtime: docker
    rootDir: todo
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/employees
    envVars:
      - key: SERVER_PORT
        value: 8000
      - key: JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect

  - type: web
    name: todo-client
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
